<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
	<title>Digital Card | Your Name</title>
<meta name="description" content="Personal business card and contact center. Connect with me via Telegram or WhatsApp.">
<meta name="keywords" content="digital card, business card, contact, portfolio, візитка, контакти, зв'язок">

<meta property="og:type" content="website">
<meta property="og:title" content="Digital Card | Your Name">
<meta property="og:description" content="Мій цифровий простір. Зв'яжіться зі мною в один клік.">
<meta property="og:image" content="https://твій-сайт.com/preview.jpg"> <meta property="og:url" content="https://твій-сайт.com">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="Digital Card | Your Name">
<meta property="twitter:description" content="Personal digital business card.">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Vision | Digital Card</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Фон анимирован */
        }

        /* Анимированный фон */
        .bg-blur {
            position: fixed;
            width: 100vw; height: 100vh;
            z-index: -1;
            filter: blur(80px);
        }
        .sphere {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .s1 { width: 300px; height: 300px; background: var(--primary); top: -50px; left: -50px; opacity: 0.4; }
        .s2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -50px; opacity: 0.3; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        /* Контейнер-визитка */
        .card {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        /* Переключатель языков */
        .lang-control {
            position: absolute;
            top: 20px; right: 20px;
            display: flex; gap: 5px;
        }
        .lang-btn {
            background: none; border: 1px solid var(--border);
            color: #fff; cursor: pointer; padding: 4px 8px;
            border-radius: 8px; font-size: 10px; transition: 0.3s;
        }
        .lang-btn.active { background: #fff; color: #000; }

        /* Контент */
        .profile-img {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            margin-bottom: 20px;
            padding: 5px;
            box-shadow: 0 0 20px var(--primary);
        }

        h1 { font-size: 28px; letter-spacing: -1px; margin-bottom: 5px; }
        .tagline { color: var(--primary); font-size: 14px; font-weight: bold; margin-bottom: 30px; text-transform: uppercase; }

        /* Кнопки мессенджеров */
        .links { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border);
        }

        .btn-tg { background: rgba(36, 161, 222, 0.2); border-color: #24A1DE; }
        .btn-wa { background: rgba(37, 211, 102, 0.2); border-color: #25D366; }

        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-tg:hover { background: #24A1DE; box-shadow: 0 0 25px rgba(36, 161, 222, 0.5); }
        .btn-wa:hover { background: #25D366; box-shadow: 0 0 25px rgba(37, 211, 102, 0.5); }

        /* Bento блоки снизу */
        .bento {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }
        .bento-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            font-size: 12px;
        }

        [data-lang="en"] { display: none; }
    </style>
</head>
<body>

<div class="bg-blur">
    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
</div>

<div class="card">
    <div class="lang-control">
        <button class="lang-btn active" onclick="changeLang('ua')">UA</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
    </div>

    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Lucky" alt="Avatar" class="profile-img">
    
    <div data-lang="ua">
        <h1>Твоє Ім'я</h1>
        <p class="tagline">Tech Enthusiast & Designer</p>
    </div>
    <div data-lang="en">
        <h1>Your Name</h1>
        <p class="tagline">Tech Enthusiast & Designer</p>
    </div>

    <div class="links">
        <a href="https://t.me/your_user" class="btn btn-tg">
            <span>Telegram</span>
        </a>
        <a href="https://wa.me/your_number" class="btn btn-wa">
            <span>WhatsApp</span>
        </a>
    </div>

    <div class="bento">
        <div class="bento-item">
            <span style="display:block; color: var(--primary); margin-bottom: 5px;">📍 Location</span>
            Kyiv, Ukraine
        </div>
        <div class="bento-item">
            <span style="display:block; color: var(--secondary); margin-bottom: 5px;">🔥 Experience</span>
            <span data-lang="ua">3 роки+</span>
            <span data-lang="en">3 years+</span>
        </div>
    </div>
</div>

<script>
    function changeLang(lang) {
        // Кнопки
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        // Текст
        if(lang === 'ua') {
            document.querySelectorAll('[data-lang="ua"]').forEach(el => el.style.display = 'block');
            document.querySelectorAll('[data-lang="en"]').forEach(el => el.style.display = 'none');
        } else {
            document.querySelectorAll('[data-lang="ua"]').forEach(el => el.style.display = 'none');
            document.querySelectorAll('[data-lang="en"]').forEach(el => el.style.display = 'block');
        }
    }
</script>

</body>
</html>
